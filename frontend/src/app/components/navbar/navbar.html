
<nav class="nav-bar">
  <div class="nav-left">
    <a routerLink="/principal" class="brand-link" aria-label="Inicio" title="Inicio">
      <img src="logo.png" class="logo" alt="ToolMarket" />
    </a>
  </div>

  <div class="nav-right">
    <a class="icon-link" routerLink="/catalogo" aria-label="Catalogo" title="Catalogo">
      <span class="material-icons" aria-hidden="true">storefront</span>
    </a>
    @if (!isAdmin()) {
      <a class="icon-link" routerLink="/carrito" aria-label="Carrito" title="Carrito">
        <span class="material-icons" aria-hidden="true">
          {{ tieneProductosEnCarrito() ? 'shopping_cart_checkout' : 'shopping_cart' }}
        </span>
      </a>
    }

    <div *ngIf="isLoggedIn" class="user-menu">
      @if (isAdmin()) {
        <a
          routerLink="/admin-productos"
          class="icon-link"
          aria-label="Inventario"
          title="Inventario"
        >
          <span class="material-icons" aria-hidden="true">inventory_2</span>
        </a>
      } @else {
        <a routerLink="/profile" class="icon-link" aria-label="Mi perfil" title="Mi perfil">
          <span class="material-icons" aria-hidden="true">account_circle</span>
        </a>
        <a routerLink="/history" class="icon-link" aria-label="Mis compras" title="Mis compras">
          <span class="material-icons" aria-hidden="true">receipt_long</span>
        </a>
      }
      <button (click)="logout()" class="icon-link btn-logout" aria-label="Cerrar sesion" title="Cerrar sesion">
        <span class="material-icons" aria-hidden="true">logout</span>
      </button>
    </div>
  </div>
</nav>
